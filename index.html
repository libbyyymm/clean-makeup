<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acne Ingredient Checker</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .subtitle {
      color: #555;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin: 14px 0 8px;
    }

    .label-note {
      font-weight: 400;
      color: #666;
      font-size: 14px;
      margin-left: 6px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 16px;
    }

    textarea {
      resize: vertical;
    }

    .url-row {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
    }

    .url-row .field {
      flex: 1 1 420px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button.secondary {
      background: #6b7280;
    }

    button.danger {
      background: #dc2626;
    }

    button.success {
      background: #059669;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .status-message {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
      min-height: 20px;
    }

    .results {
      margin-top: 24px;
      padding: 18px;
      border-radius: 12px;
      display: none;
    }

    .results.good {
      display: block;
      background: #ecfdf5;
      border: 1px solid #10b981;
    }

    .results.bad {
      display: block;
      background: #fef2f2;
      border: 1px solid #ef4444;
    }

    .results.neutral {
      display: block;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
    }

    .results ul {
      padding-left: 20px;
    }

    .note {
      margin-top: 12px;
      font-size: 14px;
      color: #444;
    }

    .save-row {
      margin-top: 14px;
      display: none;
    }

    .save-row.show {
      display: block;
    }

    .history {
      margin-top: 36px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .history-list {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .history-card {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      background: #fafafa;
    }

    .history-top {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .history-image,
    .preview-image {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #ddd;
      background: #eee;
      flex-shrink: 0;
    }

    .preview-wrap {
      margin-top: 12px;
      display: none;
      gap: 12px;
      align-items: center;
    }

    .preview-wrap.show {
      display: flex;
    }

    .preview-meta {
      font-size: 14px;
      color: #555;
    }

    .history-meta {
      flex: 1;
      min-width: 0;
    }

    .history-meta h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .history-meta a {
      color: #2563eb;
      word-break: break-all;
    }

    .status {
      display: inline-block;
      margin: 8px 0;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
    }

    .status.good {
      background: #d1fae5;
      color: #065f46;
    }

    .status.bad {
      background: #fee2e2;
      color: #991b1b;
    }

    .small {
      font-size: 14px;
      color: #555;
    }

    .empty-history {
      margin-top: 12px;
      color: #666;
    }

    .history-matches {
      margin-top: 10px;
    }

    .history-actions {
      margin-top: 14px;
    }

    @media (max-width: 640px) {
      .history-top,
      .preview-wrap.show {
        flex-direction: column;
        align-items: flex-start;
      }

      .history-image,
      .preview-image {
        width: 100%;
        max-width: 220px;
        height: auto;
        aspect-ratio: 1 / 1;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Acne Ingredient Checker</h1>
    <p class="subtitle">
      Paste a skincare, makeup, or cosmetic ingredient list to check for potentially pore-clogging ingredients.
    </p>

    <label for="productNameInput">
      Product Name <span class="label-note">(optional for saving)</span>
    </label>
    <input id="productNameInput" type="text" placeholder="Example: Hydrating Cleanser" />

    <div class="url-row">
      <div class="field">
        <label for="productUrlInput">
          Product URL <span class="label-note">(optional for saving)</span>
        </label>
        <input id="productUrlInput" type="url" placeholder="https://example.com/product-page" />
      </div>
      <div>
        <label>&nbsp;</label>
        <button id="fillFromUrlBtn" type="button">Fill from URL</button>
      </div>
    </div>

    <div id="urlStatus" class="status-message"></div>

    <div id="previewWrap" class="preview-wrap">
      <img id="previewImage" class="preview-image" alt="Product preview" />
      <div class="preview-meta">
        <div><strong>Preview loaded from URL</strong></div>
        <div id="previewText"></div>
      </div>
    </div>

    <label for="imageUrlInput">
      Product Image URL <span class="label-note">(optional for saving)</span>
    </label>
    <input id="imageUrlInput" type="url" placeholder="https://example.com/product-image.jpg" />

    <label for="ingredientsInput">Ingredients</label>
    <textarea
      id="ingredientsInput"
      rows="10"
      placeholder="Paste ingredients here..."
    ></textarea>

    <div class="button-row">
      <button id="checkBtn" type="button">Check Ingredients</button>
      <button id="clearBtn" type="button" class="secondary">Clear Form</button>
    </div>

    <section id="results" class="results"></section>

    <div id="saveRow" class="save-row">
      <button id="saveBtn" type="button" class="success">Save Result</button>
    </div>

    <section class="history">
      <div class="history-header">
        <h2>Saved History</h2>
        <button id="clearHistoryBtn" type="button" class="danger">Clear History</button>
      </div>
      <div id="historyList" class="history-list"></div>
      <p id="emptyHistory" class="empty-history">No saved results yet.</p>
    </section>
  </main>

  <script>
    const CLOGGERS = [
      "Acetylated Lanolin",
      "Lauroyl Lysine",
      "Acetylated Lanolin Alcohol",
      "Linseed Oil",
      "Algae",
      "Algae extract",
      "Algin",
      "Argan oil",
      "Butyl Stearate",
      "Carrageenan",
      "Cetearyl alcohol",
      "Ceteareth 20",
      "Cetyl Acetate",
      "Chlorella",
      "Chondrus Crispus",
      "Irish Moss",
      "Coal Tar",
      "Cocoa Butter",
      "Coconut Alkanes",
      "Coconut Butter",
      "Coconut Oil",
      "Coco Nucifera",
      "Cotton Seed Oil",
      "D&C RED",
      "Decyl Oleate",
      "Dioctyl Malate",
      "Dioctyl Succinate",
      "Disodium Monooleamido",
      "Ethoxylated Lanolin",
      "Ethylhexyl Palmitate",
      "Glyceryl Stearate SE",
      "Glyceryl-3 Diisostearate",
      "Hexadecyl Alcohol",
      "Hydrogenated Vegetable Oil",
      "Isocetyl Alcohol",
      "Isocetyl Stearate",
      "Isodecyl Oleate",
      "Isopropyl Isostearate",
      "Isopropyl Linolate",
      "Isopropyl Myristate",
      "Isopropyl Palmitate",
      "Isostearic Acid",
      "Isostearyl Isostearate",
      "Isostearyl Neopentanoate",
      "Kelp",
      "Laminaria Digitata Extract",
      "Laminaria Saccharina",
      "Lauric Acid",
      "Laureth-23",
      "Laureth-4",
      "Marula Oil",
      "Mink Oil",
      "Moringa Oil",
      "Myristic Acid",
      "Myristyl Lactate",
      "Myristyl Myristate",
      "Octyl Palmitate",
      "Octyl Stearate",
      "Oleic Acid",
      "Oleth-3",
      "Oleth-5",
      "Oleyl Alcohol",
      "Palm Oil",
      "PEG 16 Lanolin",
      "PEG 2 Sulfusuccinate",
      "PEG 200 Dilaurate",
      "PEG 8 Stearate",
      "PG Monostearate",
      "Plankton",
      "Polyglyceryl-3 Diisostearate",
      "Potassium Chloride",
      "PPG 10 Cetyl Ether",
      "PPG 2 Myristyl Propionate",
      "PPG 5 Ceteth 10 Phosphate",
      "Propylene Glycol Monostearate",
      "Red Algae",
      "Sea Whip Extract",
      "Seaweed",
      "Shark Liver Oil",
      "Shea Butter",
      "Sodium Alginate",
      "Sodium Chloride",
      "Sodium Laureth Sulfate",
      "Sodium Lauryl Sulfate",
      "Solulan 16",
      "Sorbitan Oleate",
      "Soybean Oil",
      "Glycine Soja Oil",
      "Spirulina",
      "Squalene",
      "Steareth 10",
      "Stearic Acid TEA",
      "Stearyl Heptanoate",
      "Tocopherol",
      "Wheat Germ Oil",
      "Xylene"
    ];

    const SYNONYM_GROUPS = [
      ["Laminaria Saccharina", "Seaweed"],
      ["Spirulina", "Seaweed"],
      ["Kelp", "Seaweed"]
    ];

    const DC_RED_NOTE =
      "Check number. D&C RED #3, #17, #21, #30, and #36 are commonly flagged.";

    const STORAGE_KEY = "acneCheckerHistory";

    const productNameInput = document.getElementById("productNameInput");
    const productUrlInput = document.getElementById("productUrlInput");
    const imageUrlInput = document.getElementById("imageUrlInput");
    const ingredientsInput = document.getElementById("ingredientsInput");
    const fillFromUrlBtn = document.getElementById("fillFromUrlBtn");
    const checkBtn = document.getElementById("checkBtn");
    const clearBtn = document.getElementById("clearBtn");
    const saveBtn = document.getElementById("saveBtn");
    const saveRow = document.getElementById("saveRow");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");
    const results = document.getElementById("results");
    const historyList = document.getElementById("historyList");
    const emptyHistory = document.getElementById("emptyHistory");
    const urlStatus = document.getElementById("urlStatus");
    const previewWrap = document.getElementById("previewWrap");
    const previewImage = document.getElementById("previewImage");
    const previewText = document.getElementById("previewText");

    let lastCheckedMatches = null;

    function normalizeText(text) {
      return text
        .toLowerCase()
        .replace(/\s+/g, " ")
        .replace(/[()]/g, "")
        .trim();
    }

    function parseIngredients(input) {
      return input
        .split(",")
        .map(function(item) {
          return item.trim();
        })
        .filter(function(item) {
          return item.length > 0;
        });
    }

    function removeDuplicateMatches(matches) {
      const seen = new Set();

      return matches.filter(function(match) {
        const key =
          normalizeText(match.ingredient) + "|" + normalizeText(match.matchedClogger);

        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function removeSynonymRedundancy(matches) {
      const normalizedGroups = SYNONYM_GROUPS.map(function(group) {
        return group.map(function(item) {
          return normalizeText(item);
        });
      });

      return matches.filter(function(match, index, arr) {
        const matchNorm = normalizeText(match.matchedClogger);

        for (let g = 0; g < normalizedGroups.length; g++) {
          const group = normalizedGroups[g];

          if (group.includes(matchNorm)) {
            const firstInGroup = arr.find(function(m) {
              return group.includes(normalizeText(m.matchedClogger));
            });
            return firstInGroup === match;
          }
        }

        return true;
      });
    }

    function checkIngredients(productIngredients) {
      const matches = [];

      for (let i = 0; i < productIngredients.length; i++) {
        const ingredient = productIngredients[i];
        const normalizedIngredient = normalizeText(ingredient);

        for (let j = 0; j < CLOGGERS.length; j++) {
          const clogger = CLOGGERS[j];
          const normalizedClogger = normalizeText(clogger);

          if (normalizedIngredient.includes(normalizedClogger)) {
            matches.push({
              ingredient: ingredient,
              matchedClogger: clogger
            });
          }
        }
      }

      return removeSynonymRedundancy(removeDuplicateMatches(matches));
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str == null ? "" : str;
      return div.innerHTML;
    }

    function getHistory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function saveHistory(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function formatDate(dateString) {
      const d = new Date(dateString);
      return d.toLocaleString();
    }

    function renderResults(matches) {
      results.className = "results";

      if (matches.length === 0) {
        results.classList.add("good");
        results.innerHTML =
          "<h2>No comedogenic ingredients found</h2>" +
          "<p>This does not guarantee the product is acne-safe, but none of the listed ingredients matched your flagged list.</p>";
        return;
      }

      const hasDCRed = matches.some(function(match) {
        return normalizeText(match.matchedClogger) === normalizeText("D&C RED");
      });

      const listItems = matches.map(function(match) {
        return (
          "<li><strong>" +
          escapeHtml(match.ingredient) +
          "</strong> <em>(matched: " +
          escapeHtml(match.matchedClogger) +
          ")</em></li>"
        );
      }).join("");

      let html =
        "<h2>Potentially pore-clogging ingredients found</h2>" +
        "<ul>" + listItems + "</ul>" +
        '<p class="note">Shown as: product ingredient (matched comedogenic ingredient)</p>';

      if (hasDCRed) {
        html += '<p class="note">' + escapeHtml(DC_RED_NOTE) + "</p>";
      }

      results.classList.add("bad");
      results.innerHTML = html;
    }

    function renderHistory() {
      const items = getHistory();
      historyList.innerHTML = "";

      if (items.length === 0) {
        emptyHistory.style.display = "block";
        return;
      }

      emptyHistory.style.display = "none";

      items.forEach(function(item, index) {
        const card = document.createElement("div");
        card.className = "history-card";

        const imageHtml = item.imageUrl
          ? '<img class="history-image" src="' + escapeHtml(item.imageUrl) + '" alt="' + escapeHtml(item.productName || "Product image") + '" onerror="this.style.display=\'none\'" />'
          : '<div class="history-image"></div>';

        const urlHtml = item.productUrl
          ? '<p><a href="' + escapeHtml(item.productUrl) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item.productUrl) + "</a></p>"
          : "<p class='small'>No product URL saved.</p>";

        const statusClass = item.matches.length === 0 ? "good" : "bad";
        const statusText = item.matches.length === 0
          ? "No flagged ingredients found"
          : "Potentially pore-clogging ingredients found";

        const matchesHtml = item.matches.length === 0
          ? "<p class='small'>No matched ingredients saved.</p>"
          : "<ul class='history-matches'>" +
              item.matches.map(function(match) {
                return "<li><strong>" +
                  escapeHtml(match.ingredient) +
                  "</strong> <em>(matched: " +
                  escapeHtml(match.matchedClogger) +
                  ")</em></li>";
              }).join("") +
            "</ul>";

        card.innerHTML =
          '<div class="history-top">' +
            imageHtml +
            '<div class="history-meta">' +
              "<h3>" + escapeHtml(item.productName || "Unnamed Product") + "</h3>" +
              urlHtml +
              '<div class="status ' + statusClass + '">' + escapeHtml(statusText) + "</div>" +
              '<p class="small">Saved: ' + escapeHtml(formatDate(item.checkedAt)) + "</p>" +
              matchesHtml +
              '<div class="history-actions">' +
                '<button type="button" class="danger" data-index="' + index + '">Delete</button>' +
              "</div>" +
            "</div>" +
          "</div>";

        historyList.appendChild(card);
      });

      const deleteButtons = historyList.querySelectorAll("button[data-index]");
      deleteButtons.forEach(function(btn) {
        btn.addEventListener("click", function() {
          const items = getHistory();
          const index = Number(btn.getAttribute("data-index"));
          items.splice(index, 1);
          saveHistory(items);
          renderHistory();
        });
      });
    }

    function saveCurrentResult() {
      if (!lastCheckedMatches) return;

      const items = getHistory();

      items.unshift({
        productName: productNameInput.value.trim(),
        productUrl: productUrlInput.value.trim(),
        imageUrl: imageUrlInput.value.trim(),
        ingredientsText: ingredientsInput.value.trim(),
        matches: lastCheckedMatches,
        checkedAt: new Date().toISOString()
      });

      saveHistory(items);
      renderHistory();
      saveRow.className = "save-row";
      saveBtn.textContent = "Saved";
      setTimeout(function() {
        saveBtn.textContent = "Save Result";
      }, 1000);
    }

    function setUrlStatus(message) {
      urlStatus.textContent = message || "";
    }

    function clearPreview() {
      previewWrap.className = "preview-wrap";
      previewImage.removeAttribute("src");
      previewText.textContent = "";
    }

    function showPreview(title, imageUrl) {
      if (!imageUrl) {
        clearPreview();
        return;
      }

      previewImage.src = imageUrl;
      previewText.textContent = title ? title : "Preview image loaded";
      previewWrap.className = "preview-wrap show";
    }

    async function fillFromUrl() {
      const url = productUrlInput.value.trim();

      if (!url) {
        setUrlStatus("Paste a product URL first.");
        clearPreview();
        return;
      }

      fillFromUrlBtn.disabled = true;
      setUrlStatus("Trying to load product info from URL...");
      clearPreview();

      try {
        const endpoint = "https://api.microlink.io/?url=" + encodeURIComponent(url);
        const response = await fetch(endpoint);

        if (!response.ok) {
          throw new Error("Metadata request failed.");
        }

        const data = await response.json();

        if (!data || !data.data) {
          throw new Error("No metadata returned.");
        }

        const meta = data.data;
        const detectedTitle = meta.title || "";
        const detectedImage = (meta.image && meta.image.url) ? meta.image.url : "";

        let filledAnything = false;

        if (detectedTitle && !productNameInput.value.trim()) {
          productNameInput.value = detectedTitle;
          filledAnything = true;
        }

        if (detectedImage) {
          imageUrlInput.value = detectedImage;
          filledAnything = true;
          showPreview(detectedTitle, detectedImage);
        } else {
          imageUrlInput.value = "";
          clearPreview();
        }

        if (filledAnything) {
          setUrlStatus("Loaded product info from the URL.");
        } else if (detectedTitle || detectedImage) {
          setUrlStatus("Metadata found. Existing fields were left unchanged.");
        } else {
          setUrlStatus("Could not find a useful title or image for that URL.");
        }
      } catch (error) {
        setUrlStatus("Could not load product info from that URL. You can still fill it in manually.");
        imageUrlInput.value = "";
        clearPreview();
      } finally {
        fillFromUrlBtn.disabled = false;
      }
    }

    fillFromUrlBtn.addEventListener("click", fillFromUrl);

    checkBtn.addEventListener("click", function() {
      const input = ingredientsInput.value.trim();

      if (!input) {
        results.className = "results neutral";
        results.innerHTML = "<p>Please paste an ingredient list first.</p>";
        saveRow.className = "save-row";
        lastCheckedMatches = null;
        return;
      }

      const ingredients = parseIngredients(input);
      const matches = checkIngredients(ingredients);
      lastCheckedMatches = matches;
      renderResults(matches);
      saveRow.className = "save-row show";
    });

    saveBtn.addEventListener("click", function() {
      saveCurrentResult();
    });

    clearBtn.addEventListener("click", function() {
      productNameInput.value = "";
      productUrlInput.value = "";
      imageUrlInput.value = "";
      ingredientsInput.value = "";
      results.className = "results";
      results.innerHTML = "";
      setUrlStatus("");
      clearPreview();
      saveRow.className = "save-row";
      lastCheckedMatches = null;
    });

    clearHistoryBtn.addEventListener("click", function() {
      if (!confirm("Clear all saved history?")) return;
      localStorage.removeItem(STORAGE_KEY);
      renderHistory();
    });

    renderHistory();
  </script>
</body>
</html>
